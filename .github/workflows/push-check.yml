name : push-check
on:
    push:
        branches:
            - main
jobs: 
  push-printing:
    runs-on: ubuntu-latest 
    steps: 
      - name: printing
        run: | 
            echo "Commit ${{github.sha}} as ${{github.event.head_commit.message}} by ${{github.event.head_commit.author.name}}"
            